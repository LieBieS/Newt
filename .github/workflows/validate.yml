name: Validate Newt Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Validate plugin structure
      run: npm run validate
    
    - name: Validate configuration
      run: npm run validate:config
    
    - name: Check for secrets
      run: |
        if grep -r "GITHUB_TOKEN\|JIRA_API_TOKEN\|SLACK_WEBHOOK" --include="*.yml" --include="*.json" config/ ; then
          echo "Error: Secrets found in config files"
          exit 1
        fi
    
    - name: Lint markdown files
      run: |
        npm install -g markdownlint-cli
        markdownlint '**/*.md' --ignore node_modules --ignore logs
    
    - name: Check file permissions
      run: |
        find scripts -name "*.sh" -type f ! -perm -u+x -print | while read file; do
          echo "Error: $file is not executable"
          exit 1
        done
